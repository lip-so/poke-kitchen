                <p class="community-tile__name">Game Score Tracker</p>
                <p class="community-tile__byline">@alex · 1.5k</p>
              </div>
              <span style="font-size: 10.5px; color: var(--terra); font-weight: 500; text-decoration: none; margin-top: 4px; align-self: flex-start; letter-spacing: 0.02em;">View →</span>
            </button>
          </div>

          <button
            type="button"
            class="btn-more-community"
            onclick="window.location.href='https://poke.com/recipes'"
            style="width: 100%; margin-top: 1rem; padding: 0.875rem 1.25rem; background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.85); border-radius: 14px; font-size: 14px; font-weight: 500; color: rgba(60, 70, 85, 0.85); cursor: pointer; transition: background 0.2s ease, transform 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem;"
            onmouseover="this.style.background='rgba(255, 255, 255, 0.75)'; this.style.transform='translateY(-1px)'"
            onmouseout="this.style.background='rgba(255, 255, 255, 0.65)'; this.style.transform='translateY(0)'"
            aria-label="View more community recipes"
          >
            <span>More community recipes</span>
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <path d="M9 6l6 6-6 6" />
            </svg>
          </button>

          </div>
        </div>
        </div>
        </div>
        </div>
        </div>
      </div>
    </div>

    <!-- Recipe Detail Modal -->
    <div
      id="recipeDetailModal"
      class="recipe-detail-overlay hidden fixed inset-0 z-[70] flex items-center justify-center p-4 sm:p-6"
    >
      <div class="recipe-detail-panel" role="dialog" aria-label="Recipe Details">
        <div class="recipe-detail-content">
          <div class="recipe-detail-header">
            <button
              type="button"
              onclick="closeRecipeDetail()"
              class="recipe-detail-close"
              aria-label="Close"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <path d="M6 6l12 12M18 6L6 18" />
              </svg>
            </button>
          </div>

          <div id="recipeDetailBody" class="recipe-detail-body">
            <!-- Content will be populated by JavaScript -->
          </div>
        </div>
      </div>
    </div>

    <script>
      function showRecipesHub() {
        const hub = document.getElementById("recipesHubView");
        const sub = document.getElementById("recipesSubView");
        if (hub) hub.hidden = false;
        if (sub) {
          sub.hidden = true;
          sub.classList.remove("recipies-sub--cook", "recipies-sub--community");
        }
      }

      function goRecipesCook() {
        const hub = document.getElementById("recipesHubView");
        const sub = document.getElementById("recipesSubView");
        const title = document.getElementById("recipeSheetTitle");
        const cookContent = document.getElementById("cookContent");
        const exploreContent = document.getElementById("exploreContent");
        if (hub) hub.hidden = true;
        if (sub) {
          sub.hidden = false;
          sub.classList.add("recipies-sub--cook");
          sub.classList.remove("recipies-sub--community");
        }
        if (title) title.textContent = "Cook for yourself";
        if (cookContent) cookContent.hidden = false;
        if (exploreContent) exploreContent.hidden = true;
      }

      function goRecipesCommunity() {
        const hub = document.getElementById("recipesHubView");
        const sub = document.getElementById("recipesSubView");
        const title = document.getElementById("recipeSheetTitle");
        const cookContent = document.getElementById("cookContent");
        const exploreContent = document.getElementById("exploreContent");
        if (hub) hub.hidden = true;
        if (sub) {
          sub.hidden = false;
          sub.classList.add("recipies-sub--community");
          sub.classList.remove("recipies-sub--cook");
        }
        if (title) title.textContent = "Community recipes";
        if (cookContent) cookContent.hidden = true;
        if (exploreContent) exploreContent.hidden = false;
      }

      function openRecipesModal() {
        document.body.classList.add("recipes-form-open");
        const m = document.getElementById("recipesModal");
        m.classList.remove("hidden");
        m.classList.add("flex");
        showRecipesHub();
      }

      function closeRecipesModal() {
        document.body.classList.remove("recipes-form-open");
        const m = document.getElementById("recipesModal");
        m.classList.add("hidden");
        m.classList.remove("flex");
        showRecipesHub();
        const cookContent = document.getElementById("cookContent");
        const exploreContent = document.getElementById("exploreContent");
        if (cookContent) cookContent.hidden = false;
        if (exploreContent) exploreContent.hidden = true;
        const title = document.getElementById("recipeSheetTitle");
        if (title) title.textContent = "Cook for yourself";
      }

      function getSelectedIntegrations() {
        return Array.from(
          document.querySelectorAll(
            "#cookContent [data-integration].is-selected"
          )
        ).map((b) => b.getAttribute("data-id"));
      }

      function createRecipe(e) {
        const name = document.getElementById("recipeName");
        const promptEl = document.getElementById("recipePrompt");
        const recipeName = (name && name.value.trim()) || "";
        const recipePrompt = (promptEl && promptEl.value.trim()) || "";
        if (!recipeName && !recipePrompt) {
          alert("Add a name or describe what the recipe should do");
          return;
        }
        const mockRecipeId = "r" + Math.random().toString(36).slice(2, 11);
        const button = e && e.currentTarget;
        if (button) {
          button.disabled = true;
          button.innerHTML = "Saving to drafts…";
        }

        // Save to drafts
        const newDraft = {
          id: mockRecipeId,
          name: recipeName,
          prompt: recipePrompt,
          integrations: getSelectedIntegrations(),
          editedAt: new Date().toISOString()
        };

        // Store in localStorage
        let drafts = JSON.parse(localStorage.getItem('pokeDrafts') || '{}');
        drafts[mockRecipeId] = newDraft;
        localStorage.setItem('pokeDrafts', JSON.stringify(drafts));

        if (window.console) {
          console.log("Recipe saved to drafts", newDraft);
        }

        // Update button text before redirect
        if (button) {
          button.innerHTML = "Saved! Redirecting…";
        }

        setTimeout(() => {
          window.location.href = "https://poke.com/recipes";
        }, 1000);
      }

      document
        .querySelectorAll("#recipesModal [data-integration]")
        .forEach((btn) => {
          btn.addEventListener("click", () => {
            const on = btn.classList.toggle("is-selected");
            btn.setAttribute("aria-pressed", on ? "true" : "false");
          });
        });

      document
        .querySelectorAll("#recipesModal [data-seg]")
        .forEach((btn) => {
          btn.addEventListener("click", function () {
            const group = this.getAttribute("data-group");
            const segmentButtons = document.querySelectorAll(
              "#recipesModal [data-seg][data-group=\"" + group + "\"]"
            );

            // Remove active class from all buttons in this group
            segmentButtons.forEach((b) => {
              b.classList.remove("recipe-seg--on");
            });

            // Add active class to clicked button
            this.classList.add("recipe-seg--on");

            // Handle cook view switching
            if (group === "cook") {
              const buttonText = this.textContent.trim();
              switchCookView(buttonText);
            }

            // Handle community category filtering
            if (group === "com") {
              const label = this.textContent.trim().toLowerCase();
              document.querySelectorAll(".community-tile").forEach((tile) => {
                const cat = tile.getAttribute("data-category");
                if (label === "all" || cat === label) {
                  tile.style.display = "";
                } else {
                  tile.style.display = "none";
                }
              });
            }
          });
        });

      function switchCookView(view) {
        const composerView = document.getElementById("cookComposerView");
        const draftsView = document.getElementById("cookDraftsView");

        // Hide all views
        if (composerView) composerView.hidden = true;
        if (draftsView) draftsView.hidden = true;

        // Show selected view
        // "Cooking" now shows the composer (for creating new recipes)
        if (view === "Cooking") {
          if (composerView) composerView.hidden = false;
        } else if (view === "Drafts") {
          if (draftsView) draftsView.hidden = false;
        }
      }

      // Function to create a new recipe (clear form)
      function createNewRecipe() {
        // Switch to Cooking view
        switchCookView('Cooking');

        // Set Cooking as active tab
        document.querySelectorAll('#cookContent [data-seg][data-group="cook"]').forEach(b => {
          b.classList.remove('recipe-seg--on');
        });
        const cookingButton = document.querySelector('#cookContent [data-seg][data-group="cook"]');
        if (cookingButton) {
          cookingButton.classList.add('recipe-seg--on');
        }

        // Clear the form
        setTimeout(() => {
          const nameInput = document.getElementById('recipeName');
          if (nameInput) {
            nameInput.value = '';
          }

          const promptInput = document.getElementById('recipePrompt');
          if (promptInput) {
            promptInput.value = '';
          }

          // Clear all integrations
          document.querySelectorAll('#cookContent [data-integration].is-selected').forEach(tile => {
            tile.classList.remove('is-selected');
            tile.setAttribute('aria-pressed', 'false');
          });

          // Focus on name input
          if (nameInput) {
            nameInput.focus();
          }
        }, 50);
      }

      const focusNameBtn = document.querySelector(
        "#recipesModal [data-focus-name]"
      );
      if (focusNameBtn) {
        focusNameBtn.addEventListener("click", () => {
          const n = document.getElementById("recipeName");
          if (n) n.focus();
        });
      }

      document
        .getElementById("recipesModal")
        .addEventListener("click", function (e) {
          if (e.target === this) closeRecipesModal();
        });
      document.addEventListener("keydown", function (e) {
        if (e.key !== "Escape") return;
        const m = document.getElementById("recipesModal");
        if (!m || m.classList.contains("hidden")) return;
        const sub = document.getElementById("recipesSubView");
        if (sub && !sub.hidden) {
          showRecipesHub();
        } else {
          closeRecipesModal();
        }
      });

      // Remix functionality
      function toggleRemixExpand() {
        const content = document.getElementById("remixExpandedContent");
        const chevron = document.getElementById("remixChevron");
        const btn = document.getElementById("remixToggleBtn");

        if (content.hidden) {
          content.hidden = false;
          chevron.classList.add("expanded");
          btn.setAttribute("aria-expanded", "true");
        } else {
          content.hidden = true;
          chevron.classList.remove("expanded");
          btn.setAttribute("aria-expanded", "false");
        }
      }

      function selectRemixRecipe(button) {
        // Remove selection from all recipe options
        document.querySelectorAll(".remix-recipe-option").forEach(opt => {
          opt.classList.remove("selected");
        });
        // Select this one
        button.classList.add("selected");
        updateRemixButton();
      }

      function toggleRemixIntegration(button) {
        button.classList.toggle("selected");
        updateRemixButton();
      }

      function updateRemixButton() {
        const selectedRecipe = document.querySelector(".remix-recipe-option.selected");
        const selectedIntegrations = document.querySelectorAll(".remix-integration-tile.selected");
        const createBtn = document.querySelector(".btn-create-remix");

        if (selectedRecipe && selectedIntegrations.length > 0) {
          createBtn.disabled = false;
        } else {
          createBtn.disabled = true;
        }
      }

      function createRemixRecipe() {
        const selectedRecipe = document.querySelector(".remix-recipe-option.selected");
        const selectedIntegrations = Array.from(
          document.querySelectorAll(".remix-integration-tile.selected")
        ).map(tile => tile.getAttribute("data-integration"));

        if (!selectedRecipe || selectedIntegrations.length === 0) {
          alert("Please select a recipe and at least one integration");
          return;
        }

        const recipeName = selectedRecipe.querySelector(".remix-option-title").textContent;
        const recipeId = selectedRecipe.getAttribute("data-recipe");

        console.log("Creating remixed recipe:", {
          baseRecipe: recipeId,
          name: recipeName,
          integrations: selectedIntegrations
        });

        // Navigate to cook view with pre-filled data
        goRecipesCook();

        // Pre-fill the recipe name
        setTimeout(() => {
          const nameInput = document.getElementById("recipeName");
          if (nameInput) {
            nameInput.value = "Remixed: " + recipeName;
          }

          // Pre-select integrations
          selectedIntegrations.forEach(integrationId => {
            const tile = document.querySelector(
              `#cookContent [data-integration][data-id="${integrationId}"]`
            );
            if (tile && !tile.classList.contains("is-selected")) {
              tile.click();
            }
          });
        }, 100);
      }

      // Initialize remix button state
      document.addEventListener("DOMContentLoaded", function() {
        updateRemixButton();

        // Vercel Guideline: Enter key to submit, Cmd/Ctrl+Enter for textarea
        const recipeNameInput = document.getElementById('recipeName');
        const recipePromptInput = document.getElementById('recipePrompt');

        if (recipeNameInput) {
          recipeNameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey && !e.metaKey && !e.ctrlKey) {
              e.preventDefault();
              const btn = document.querySelector('.btn-cook-recipe');
              if (btn && !btn.disabled) {
                btn.click();
              }
            }
          });
        }

        if (recipePromptInput) {
          recipePromptInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
              e.preventDefault();
              const btn = document.querySelector('.btn-cook-recipe');
              if (btn && !btn.disabled) {
                btn.click();
              }
            }
          });
        }
      });

      // Draft recipes data
      const draftRecipes = {
        'morning-digest': {
          name: 'Morning digest',
          prompt: 'Text me every Monday at 8am with a summary of my calendar, top emails, and weather forecast',
          integrations: ['notion', 'uber', 'canvas']
        },
        'birthday-texter': {
          name: 'Birthday texter',
          prompt: 'Check my contacts for birthdays and send me a reminder 3 days before with gift suggestions',
          integrations: ['notion', 'canvas']
        }
      };

      function openDraft(draftId) {
        const draft = draftRecipes[draftId];
        if (!draft) return;

        // Check if we're already in the cook view
        const cookContent = document.getElementById('cookContent');
        const isInCookView = cookContent && !cookContent.hidden;

        if (!isInCookView) {
          // Navigate to cook view first
          goRecipesCook();
        }

        // Switch to "Cooking" view to show the composer
        setTimeout(() => {
          switchCookView('Cooking');

          // Set "Cooking" button as active
          const cookingButton = document.querySelector('#cookContent [data-seg][data-group="cook"]');
          if (cookingButton) {
            document.querySelectorAll('#cookContent [data-seg][data-group="cook"]').forEach(b => {
              b.classList.remove('recipe-seg--on');
            });
            cookingButton.classList.add('recipe-seg--on');
          }

          // Pre-fill the form with draft data
          setTimeout(() => {
            // Set recipe name
            const nameInput = document.getElementById('recipeName');
            if (nameInput) {
              nameInput.value = draft.name;
            }

            // Set recipe prompt
            const promptInput = document.getElementById('recipePrompt');
            if (promptInput) {
              promptInput.value = draft.prompt;
            }

            // Clear existing selections
            document.querySelectorAll('#cookContent [data-integration].is-selected').forEach(tile => {
              tile.classList.remove('is-selected');
              tile.setAttribute('aria-pressed', 'false');
            });

            // Select the saved integrations
            draft.integrations.forEach(integrationId => {
              const tile = document.querySelector(
                `#cookContent [data-integration][data-id="${integrationId}"]`
              );
              if (tile && !tile.classList.contains('is-selected')) {
                tile.classList.add('is-selected');
                tile.setAttribute('aria-pressed', 'true');
              }
            });
          }, 50);
        }, isInCookView ? 0 : 100);
      }

      // Recipe details data
      const recipeDetails = {
        'ramen-radar': {
          name: 'Ramen Radar',
          author: '@kenji',
          installs: '1.1k',
          description: 'Get notified when your favorite ramen shops have availability. Never miss out on that perfect bowl again.',
          integrations: ['Yelp', 'Google Maps', 'Messages'],
          trigger: 'When restaurant availability changes',
          action: 'Sends you a text with restaurant details and booking link'
        },
        'gym-checkin': {
          name: 'Gym Check-in',
          author: '@lex',
          installs: '812',
          description: 'Automatic check-in reminders and workout tracking. Logs your gym visits and sends weekly summaries.',
          integrations: ['Strava', 'Google Calendar', 'Messages'],
          trigger: 'At your scheduled workout time',
          action: 'Reminds you to check in and tracks your consistency'
        },
        'plant-watering': {
          name: 'Plant Watering',
          author: '@rosa',
          installs: '643',
          description: 'Never forget to water your plants again. Smart reminders based on plant type and weather conditions.',
          integrations: ['Weather API', 'Calendar', 'Messages'],
          trigger: 'Based on plant watering schedule and weather',
          action: 'Sends watering reminders with care tips'
        },
        'daily-standup': {
          name: 'Daily Standup',
          author: '@juno',
          installs: '418',
          description: 'Automate your team standup updates. Pulls from your calendar, tasks, and messages recent accomplishments.',
          integrations: ['Slack', 'Notion', 'Google Calendar'],
          trigger: 'Every morning at 9am',
          action: 'Posts your standup update to Slack'
        },
        'code-reviewer': {
          name: 'Code Reviewer',
          author: '@dev',
          installs: '2.2k',
          description: 'Get instant summaries of pull requests. Reviews code changes and highlights important updates.',
          integrations: ['GitHub', 'Slack', 'Messages'],
          trigger: 'When a PR is opened or updated',
          action: 'Sends code review summary with key changes'
        },
        'game-tracker': {
          name: 'Game Score Tracker',
          author: '@alex',
          installs: '1.5k',
          description: 'Track scores for your favorite sports teams. Get real-time updates and game summaries.',
          integrations: ['ESPN API', 'Messages', 'Calendar'],
          trigger: 'During live games',
          action: 'Sends score updates and game highlights'
        }
      };

      function openRecipeDetail(recipeId) {
        const recipe = recipeDetails[recipeId];
        if (!recipe) return;

        const modal = document.getElementById('recipeDetailModal');
        const body = document.getElementById('recipeDetailBody');

        // Build integration logos HTML
        const integrationLogos = recipe.integrations.map(integration => {
          const logoMap = {
            'Notion': 'logos/notion.png',
            'Canvas': 'logos/canvas.webp',
            'Strava': 'logos/strava.png',
            'Uber': 'logos/uber.webp',
            'Venmo': 'logos/venmo.png'
          };

          const logoSrc = logoMap[integration];
          if (logoSrc) {
            return `<img src="${logoSrc}" alt="${integration}" class="recipe-detail-integration-logo" />`;
          } else {
            // Use placeholder for services without logos
            return `<div class="recipe-detail-integration-placeholder">${integration}</div>`;
          }
        }).join('');

        body.innerHTML = `
          <div class="recipe-detail-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9860e8" stroke-width="1.8">
              <path d="M3 7h9M3 12h7M3 17h5" />
              <path d="M17 4l1.2 2.8L21 8l-2.8 1.2L17 12l-1.2-2.8L13 8l2.8-1.2z" fill="#9860e8" />
            </svg>
          </div>

          <h3 class="recipe-detail-title">${recipe.name}</h3>
          <p class="recipe-detail-meta">${recipe.author} · ${recipe.installs} installs</p>

          <p class="recipe-detail-description">${recipe.description}</p>

          <div class="recipe-detail-section">
            <h4 class="recipe-detail-section-title">Works with</h4>
            <div class="recipe-detail-integrations">
              ${integrationLogos}
            </div>
          </div>

          <div class="recipe-detail-section">
            <h4 class="recipe-detail-section-title">How it works</h4>
            <div class="recipe-detail-flow">
              <div class="recipe-detail-flow-item">
                <div class="recipe-detail-flow-icon trigger">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                  </svg>
                </div>
                <div>
                  <p class="recipe-detail-flow-label">Trigger</p>
                  <p class="recipe-detail-flow-text">${recipe.trigger}</p>
                </div>
              </div>
              <div class="recipe-detail-flow-arrow">→</div>
              <div class="recipe-detail-flow-item">
                <div class="recipe-detail-flow-icon action">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                  </svg>
                </div>
                <div>
                  <p class="recipe-detail-flow-label">Action</p>
                  <p class="recipe-detail-flow-text">${recipe.action}</p>
                </div>
              </div>
            </div>
          </div>

          <button type="button" class="btn-add-to-poke" onclick="addRecipeToPoke('${recipeId}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
              <path d="M12 5v14M5 12h14" />
            </svg>
            Install
          </button>
        `;

        modal.classList.remove('hidden');
        modal.classList.add('flex');
      }

      function closeRecipeDetail() {
        const modal = document.getElementById('recipeDetailModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
      }

      function addRecipeToPoke(recipeId) {
        const recipe = recipeDetails[recipeId];
        console.log('Adding recipe to Poke:', recipe);

        // Show success feedback
        alert(`"${recipe.name}" has been added to your recipes!`);

        // Close modal and go to cook view
        closeRecipeDetail();
        goRecipesCook();

        // Pre-fill with recipe name
        setTimeout(() => {
          const nameInput = document.getElementById('recipeName');
          if (nameInput) {
            nameInput.value = recipe.name;
          }
        }, 100);
      }

      // Close detail modal on escape or backdrop click
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          const modal = document.getElementById('recipeDetailModal');
          if (modal && !modal.classList.contains('hidden')) {
            closeRecipeDetail();
          }
        }
      });

      document.getElementById('recipeDetailModal')?.addEventListener('click', function(e) {
        if (e.target === this) {
          closeRecipeDetail();
        }
      });
    </script>
  </body>
</html>
